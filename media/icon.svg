<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2a4a"/>
      <stop offset="1" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="cube" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9a3c"/>
      <stop offset="1" stop-color="#ff6a00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Build cube (isometric) -->
  <g transform="translate(64 60)">
    <!-- top face -->
    <path d="M0 -34 L34 -16 L0 2 L-34 -16 Z" fill="#ffb765"/>
    <!-- left face -->
    <path d="M-34 -16 L0 2 L0 40 L-34 22 Z" fill="url(#cube)"/>
    <!-- right face -->
    <path d="M34 -16 L0 2 L0 40 L34 22 Z" fill="#e85d04"/>
  </g>

  <!-- Status check badge -->
  <g transform="translate(90 90)">
    <circle r="22" fill="#2ecc71"/>
    <path d="M-9 1 L-2 8 L11 -8" fill="none" stroke="#ffffff" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
